name = "eternium-api"
main = "worker.js"
compatibility_date = "2024-12-01"

# Custom domain: api.eternium.ai
# Set up via Cloudflare Dashboard → Workers → Custom Domains
# Or use routes below if proxying through a zone:
# routes = [{ pattern = "api.eternium.ai/*", zone_name = "eternium.ai" }]

[vars]
ADMIN_EMAIL = "ty@eternium.ai"
SUPABASE_PROJECT_REF = "wmahfjguvqvefgjpbcdc"

# ── KV Namespaces ────────────────────────────────────────────────
# Create ALL of these before first deploy:
#   wrangler kv namespace create API_KEYS
#   wrangler kv namespace create USERS
#   wrangler kv namespace create USAGE
#   wrangler kv namespace create CACHE
#
# Then paste the IDs below:

[[kv_namespaces]]
binding = "API_KEYS"
id = "7a99702bb5a7469797a66c2fcd051db2"

[[kv_namespaces]]
binding = "USERS"
id = "60a2ff86e6fb45d7a4f7b34a9f7db6cf"

[[kv_namespaces]]
binding = "USAGE"
id = "4495ba1e13004534b0e40dd4ad9a35fd"

[[kv_namespaces]]
binding = "CACHE"
id = "ca36ec423ccc4eb2b3d67ef1a3d202d5"

[[kv_namespaces]]
binding = "TENANTS"
id = "ab6f773b16a3438a961f0ed05917777c"

# ── Supabase (Content API) ──────────────────────────────────────
# Required for /v1/content/* endpoints (blog, products, datasets)
# Set via CLI:
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SERVICE_KEY

# ── R2 Object Storage (permanent media archive) ─────────────────
[[r2_buckets]]
binding = "MEDIA_STORAGE"
bucket_name = "eternium-media"

# ── Secrets (set via CLI: wrangler secret put <NAME>) ────────────
# KIE_API_KEY, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, JWT_SECRET
# OPENAI_API_KEY, SUPABASE_URL, SUPABASE_SERVICE_KEY
# SUPABASE_JWT_SECRET  — Supabase JWT signing secret (HS256). Enables dual auth:
#                        API accepts both custom JWTs and Supabase JWTs.
#                        Get from: Supabase Dashboard > Settings > API > JWT Secret
# OPENROUTER_API_KEY  (optional — fallback for chat/embeddings if OpenAI is down)
# GITHUB_PAT           — Fine-grained PAT for Armory product repo invitations
#                        Needs: Contents (read) + Administration (write) on
#                        EterniumAI/armory-content-system-pro
#                        Set: wrangler secret put GITHUB_PAT

# ── Managed Hosting (*.app.eternium.ai tenant subdomains) ───────
# Wildcard route scoped to app.eternium.ai to avoid conflicts with
# existing proxied subdomains (helix, dash, lamarnie, etc.).
# Requires wildcard DNS: *.app.eternium.ai -> Worker
# [[routes]]
# pattern = "*.app.eternium.ai/*"
# zone_name = "eternium.ai"
# NOTE: Route commented out for deploy — already configured in Cloudflare from prior deploy.
# Token missing Zone > Workers Routes > Edit permission. Re-enable when token is updated.

# ── Cron Triggers ─────────────────────────────────────────────────
# Daily SOP morning brief removed 2026-04-16 -- the canonical brief is
# produced by /root/sovereign/scripts/morning-brief.js on the Bunker
# (root crontab "37 14 * * *"). This Worker's scheduled trigger was
# duplicating the send to Telegram with a stale date. Manual endpoint
# at GET /admin/morning-brief is still available for ad-hoc triggering.
# [triggers]
# crons = ["30 13 * * *"]

[assets]
directory = "./public"

# ── Logpush to R2 ────────────────────────────────────────────────
# Enable via Cloudflare Dashboard > Workers > eternium-api > Logs > Push
# Destination: R2 bucket "eternium-logs"
# Filters: include console.error/console.warn only (saves cost)
# Format: JSON, ND-JSON gzip
[observability]
enabled = true
head_sampling_rate = 1.0

# [[r2_buckets]]
# binding = "LOGS"
# bucket_name = "eternium-logs"
